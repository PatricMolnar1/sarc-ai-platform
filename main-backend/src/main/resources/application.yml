# Core Backend configuration (Spring Boot, PostgreSQL 16, port 8080).
#
# Postgres-only (no H2 dev profile). Schema is managed by Hibernate ddl-auto
# (update), with no Flyway. Connection defaults target a local Postgres; the
# Docker profile (application-docker.yml) points at the compose service instead.
server:
  port: 8080

spring:
  application:
    name: core-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sarcopenia}
    username: ${DB_USERNAME:sarcopenia}
    password: ${DB_PASSWORD:sarcopenia}
  jpa:
    hibernate:
      # Stack decision: Hibernate generates/updates the schema from entities.
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    # Serialise Instant/LocalDate as ISO-8601 strings (e.g. "2026-05-28T09:15:00Z"),
    # matching the camelCase JSON contracts.
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      # slices.npy can be a few MB (N x 256 x 256 x 4 bytes); allow generous parts.
      max-file-size: 64MB
      max-request-size: 128MB

# Application-specific settings (bound by AppProperties).
app:
  # Root for permanent file storage (slices.npy, masks.npy, preview.png).
  # Docker mounts a named volume here.
  storage-root: ${STORAGE_ROOT:./storage}
  # Prefix prepended to Scan.previewUrl so the browser can resolve it. In dev the
  # Web UI reaches the backend through the Vite "/core" proxy (vite.config.ts),
  # so previews must be served under that prefix. Override for other deployments.
  public-base-path: ${PUBLIC_BASE_PATH:/core}
  # CORS allowed origins. Dev uses the Vite proxy so this is mostly a safety net
  # for direct browser access.
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  # Seed the demo patients on an empty database so the UI behaves like the mock.
  seed-demo-data: ${SEED_DEMO_DATA:true}

logging:
  level:
    org.hibernate.SQL: info
